<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Ads Report - AB Integral Safety</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f1117; color:#e0e0e0; line-height:1.6; }
        .container { max-width:1400px; margin:0 auto; padding:24px; }
        .header { background:linear-gradient(135deg,#1a1d29,#252836); border-radius:16px; padding:32px; margin-bottom:24px; border:1px solid #2d3148; }
        .header h1 { font-size:28px; color:#fff; margin-bottom:8px; }
        .header .subtitle { color:#8b8fa3; font-size:14px; }
        .header .period { display:inline-block; background:#2563eb22; color:#60a5fa; padding:4px 12px; border-radius:6px; font-size:13px; margin-top:8px; }
        .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
        .kpi-card { background:#1a1d29; border-radius:12px; padding:20px; border:1px solid #2d3148; transition:transform .2s; }
        .kpi-card:hover { transform:translateY(-2px); }
        .kpi-label { font-size:12px; color:#8b8fa3; text-transform:uppercase; letter-spacing:1px; }
        .kpi-value { font-size:28px; font-weight:700; color:#fff; margin:8px 0 4px; }
        .kpi-value.blue { color:#60a5fa; } .kpi-value.green { color:#34d399; }
        .kpi-value.orange { color:#fbbf24; } .kpi-value.purple { color:#a78bfa; }
        .section { background:#1a1d29; border-radius:12px; padding:24px; margin-bottom:24px; border:1px solid #2d3148; }
        .section h2 { font-size:18px; color:#fff; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid #2d3148; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { text-align:left; padding:10px 12px; background:#252836; color:#8b8fa3; font-weight:600; text-transform:uppercase; font-size:11px; letter-spacing:.5px; border-bottom:2px solid #2d3148; }
        td { padding:10px 12px; border-bottom:1px solid #1e2130; }
        tr:hover { background:#252836; }
        .chart-container { position:relative; height:300px; margin-top:16px; }
        .ad-hl { font-weight:600; color:#60a5fa; margin-bottom:4px; font-size:13px; }
        .ad-desc { color:#8b8fa3; font-size:12px; }
        .ib { background:#252836; border-radius:8px; padding:16px; margin-bottom:16px; font-size:13px; color:#8b8fa3; line-height:1.8; }
        .tw { overflow-x:auto; }
        .footer { text-align:center; padding:24px; color:#4a4e69; font-size:12px; }
        .fl { display:block; font-size:12px; color:#8b8fa3; margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
        .fi { width:100%; padding:10px 14px; border-radius:8px; border:1px solid #2d3148; background:#252836; color:#fff; font-size:14px; outline:none; }
        .fi:focus { border-color:#60a5fa; }
        select.fi { cursor:pointer; }
        .btn-submit { padding:12px 32px; border-radius:8px; border:none; background:#2563eb; color:#fff; font-size:14px; font-weight:600; cursor:pointer; transition:background .2s; }
        .btn-submit:hover { background:#1d4ed8; }
        @media (max-width:768px) { .kpi-grid { grid-template-columns:repeat(2,1fr); } .kpi-value { font-size:22px; } }

        /* Login gate */
        #gate { position:fixed; inset:0; background:#0f1117; z-index:9999; display:flex; align-items:center; justify-content:center; }
        #gate.off { display:none; }
        .lb { background:#1a1d29; border:1px solid #2d3148; border-radius:16px; padding:40px; max-width:400px; width:90%; text-align:center; }
        .lb h2 { color:#fff; margin-bottom:8px; font-size:20px; }
        .lb .sub { color:#8b8fa3; font-size:14px; margin-bottom:24px; }
        .lb input { width:100%; padding:12px 16px; border-radius:8px; border:1px solid #2d3148; background:#252836; color:#fff; font-size:16px; text-align:center; letter-spacing:3px; outline:none; margin-bottom:16px; }
        .lb input:focus { border-color:#60a5fa; }
        .lb button { width:100%; padding:12px; border-radius:8px; border:none; background:#2563eb; color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
        .lb button:hover { background:#1d4ed8; }
        .lb .err { color:#f87171; font-size:13px; margin-top:12px; display:none; }
        .lb .loading { color:#8b8fa3; font-size:13px; margin-top:8px; display:none; }
        #rpt { display:none; }
        #rpt.on { display:block; }
    </style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="gate">
    <div class="lb">
        <h2>AB Integral Safety</h2>
        <div class="sub">Google Ads Report</div>
        <input type="password" id="pw" placeholder="Unesite sifru" autocomplete="off" />
        <button onclick="unlock()">Pristup reportu</button>
        <div class="loading" id="pw-loading">Dekriptovanje...</div>
        <div class="err" id="pw-err">Pogresna sifra. Pokusajte ponovo.</div>
    </div>
</div>

<script>
// AES-256-GCM decryption using Web Crypto API + PBKDF2
async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
    );
}

function b64decode(s) {
    const raw = atob(s);
    const arr = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
}

async function decryptContent(password) {
    const data = JSON.parse(document.getElementById('enc-data').textContent);
    const salt = b64decode(data.salt);
    const iv = b64decode(data.iv);
    const ct = b64decode(data.ciphertext);
    const key = await deriveKey(password, salt);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    return new TextDecoder().decode(decrypted);
}

async function unlock() {
    const pw = document.getElementById('pw').value.trim();
    if (!pw) return;
    document.getElementById('pw-err').style.display = 'none';
    document.getElementById('pw-loading').style.display = 'block';
    try {
        const html = await decryptContent(pw);
        document.getElementById('rpt').innerHTML = html;
        document.getElementById('rpt').classList.add('on');
        document.getElementById('gate').classList.add('off');
        sessionStorage.setItem('rpt_pw', pw);
        // Re-run inline scripts (defines initChart and calls it)
        document.getElementById('rpt').querySelectorAll('script').forEach(s => {
            const ns = document.createElement('script');
            ns.textContent = s.textContent;
            document.body.appendChild(ns);
        });
    } catch (e) {
        document.getElementById('pw-loading').style.display = 'none';
        document.getElementById('pw-err').style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
    }
}

document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

// Auto-login if already authenticated in session
(async function() {
    const cached = sessionStorage.getItem('rpt_pw');
    if (cached) {
        try {
            const html = await decryptContent(cached);
            document.getElementById('rpt').innerHTML = html;
            document.getElementById('rpt').classList.add('on');
            document.getElementById('gate').classList.add('off');
            setTimeout(() => {
                document.getElementById('rpt').querySelectorAll('script').forEach(s => {
                    const ns = document.createElement('script');
                    ns.textContent = s.textContent;
                    document.body.appendChild(ns);
                });
            }, 100);
        } catch {}
    }
})();
</script>
